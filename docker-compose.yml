services:
  mysql:
    image: mysql:8
    container_name: legalaidnow-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - legalaidnow-mysql-data:/var/lib/mysql
    networks:
      - legalaidnow-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./legalaidnow-backend
    container_name: legalaidnow-spring-backend
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    networks:
      - legalaidnow-net

  frontend:
    build: ./legalaidnow-frontend
    container_name: legalaidnow-react-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - legalaidnow-net

volumes:
  legalaidnow-mysql-data:

networks:
  legalaidnow-net:
