version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: legalaidnow-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '@diMySQL'
      MYSQL_DATABASE: legalaid_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - legalaidnow-mysql-data:/var/lib/mysql
    networks:
      - legalaidnow-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./legalaidnow-backend
    container_name: legalaidnow-spring-backend
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://legalaidnow-mysql-db:3306/legalaid_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: '@diMySQL'
    networks:
      - legalaidnow-net

  frontend:
    build: ./legalaidnow-frontend
    container_name: legalaidnow-react-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - legalaidnow-net

volumes:
  legalaidnow-mysql-data:

networks:
  legalaidnow-net:
